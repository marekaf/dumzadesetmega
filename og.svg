<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef1f4"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="60%" stop-color="#fff3a8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="1080" cy="120" r="42" fill="#f5d597" opacity="0.7"/>

  <!-- House illustration -->
  <g transform="translate(860, 350)" opacity="0.85">
    <polygon points="-90,-20 0,-110 90,-20" fill="#9c5b3f" stroke="#6d3e2a" stroke-width="2"/>
    <rect x="-80" y="-20" width="160" height="120" fill="#f4ecd9" stroke="#b59c6f" stroke-width="2"/>
    <rect x="-10" y="40" width="40" height="60" fill="#7a5230" stroke="#4f351f" stroke-width="2"/>
    <rect x="-60" y="10" width="34" height="34" fill="#d8e6ee" stroke="#7a8a96" stroke-width="2"/>
    <rect x="40" y="10" width="34" height="34" fill="#d8e6ee" stroke="#7a8a96" stroke-width="2"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#6b6b6b" letter-spacing="3">DŮM ZA DESET MEGA</text>

  <!-- Main hook -->
  <text x="80" y="220" font-family="-apple-system, system-ui, sans-serif" font-size="58" font-weight="800" fill="#1a1a1a">Z 10 mil. Kč jde státu</text>
  <text x="80" y="290" font-family="-apple-system, system-ui, sans-serif" font-size="58" font-weight="800" fill="#1a1a1a">a bance dohromady</text>
  <rect x="80" y="335" width="540" height="68" fill="#fff3a8"/>
  <text x="80" y="392" font-family="-apple-system, system-ui, sans-serif" font-size="86" font-weight="800" fill="#c0392b">~24 mil. Kč.</text>

  <!-- Subline -->
  <text x="80" y="460" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#6b6b6b">Vizualizace daňového a úrokového zatížení</text>
  <text x="80" y="494" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#6b6b6b">při pořízení rodinného domu v ČR.</text>

  <!-- URL -->
  <text x="80" y="570" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="#1a1a1a">dumzadesetmega.marekbartik.com</text>
</svg>
